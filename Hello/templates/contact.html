{% extends 'base.html'%}

{% block title %}Contact{% endblock title %}

{% block body %}


<div class="container-fluid my-2">   

<img src="https://images.unsplash.com/photo-1450818074504-fb9713fe584e?q=80&w=1169&auto=format&fit=crop"
     style="width:1200px; height:600px;"
     class="d-block w-100 my-3"
     alt="...">
     <h1 class="text-center">Contact Us</h1>
</div>


<div class="container">
<form method="post" action="/contact">
    {% csrf_token %}
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your Name">
  </div>

<div class="form-group">
    <label for="email">Email address</label>
    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your Email">
  </div>

<div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="phone" class="form-control" id="phone" name="phone" placeholder="Enter your Phone Number">
  </div>


<div class="form-group">
    <label for="desc">Tell me about what you want to connect me for.....</label>
     <textarea class="form-control" id="desc" rows="3" name="desc" ></textarea>
  </div>

<button class="btn btn-primary"="submit">Submit</button>
  
</form>


</div>


{% endblock body %}
